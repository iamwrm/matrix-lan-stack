name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d

      - name: Wait for Conduwuit
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6167/_matrix/client/versions >/dev/null 2>&1; then
              echo "Conduwuit is up"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Conduwuit failed to start"
          docker compose logs conduwuit
          exit 1

      - name: Verify Element Web
        run: curl -sf http://localhost:8080 | grep -q "Element" && echo "Element Web is serving"

      - name: Test Matrix versions endpoint
        run: curl -sf http://localhost:6167/_matrix/client/versions | jq .

      - name: Logs on failure
        if: failure()
        run: docker compose logs
