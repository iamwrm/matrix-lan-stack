services:
  conduwuit:
    image: ghcr.io/continuwuity/continuwuity:v0.5.5
    restart: unless-stopped
    ports:
      - "6167:6167"
    volumes:
      - conduwuit-data:/var/lib/conduwuit
      - ./conduwuit.toml:/conduwuit.toml:ro
    environment:
      CONDUWUIT_CONFIG: /conduwuit.toml

  cinny:
    image: ajbura/cinny:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./cinny-config.json:/app/config.json:ro
    depends_on:
      - conduwuit

volumes:
  conduwuit-data:
