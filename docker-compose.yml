services:
  conduwuit:
    image: ghcr.io/continuwuity/continuwuity:v0.5.5
    restart: unless-stopped
    ports:
      - "6167:6167"
    volumes:
      - conduwuit-data:/var/lib/conduwuit
    environment:
      CONDUWUIT_SERVER_NAME: ${SERVER_NAME:-matrix.lan}
      CONDUWUIT_PORT: 6167
      CONDUWUIT_DATABASE_PATH: /var/lib/conduwuit
      CONDUWUIT_ALLOW_REGISTRATION: "true"
      CONDUWUIT_ALLOW_FEDERATION: "false"
      CONDUWUIT_TRUSTED_SERVERS: '[]'
      CONDUWUIT_ADDRESS: "0.0.0.0"
      CONDUWUIT_LOG: "info"

  cinny:
    image: ajbura/cinny:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./cinny-config.json:/app/config.json:ro
    depends_on:
      - conduwuit

volumes:
  conduwuit-data:
